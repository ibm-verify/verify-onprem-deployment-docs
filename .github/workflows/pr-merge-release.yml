# GitHub Actions Workflow for PR Merge Documentation Release

name: PR Merge Documentation Release

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - master

jobs:
  create-release:
    name: Create Release if Documentation Regeneration Requested
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    
    steps:
      - name: Check if documentation regeneration is requested
        id: check_regen
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          echo "PR Body:"
          printf '%s\n' "$PR_BODY"
          echo ""
          
          # Check if the PR body contains the checked checkbox for documentation regeneration
          # Handle both [x] and [X] (case-insensitive)
          if printf '%s\n' "$PR_BODY" | grep -iq "\[x\] Documentation should be regenerated after merge"; then
            echo "✅ Documentation regeneration requested"
            echo "regen_requested=true" >> $GITHUB_OUTPUT
          else
            echo "ℹ️ Documentation regeneration not requested"
            echo "regen_requested=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Checkout repository
        if: steps.check_regen.outputs.regen_requested == 'true'
        uses: actions/checkout@v4
      
      - name: Generate release tag
        if: steps.check_regen.outputs.regen_requested == 'true'
        id: generate_tag
        run: |
          # Generate tag in format vYYYYMMDD-HH-MM (UTC)
          TAG_NAME="v$(date -u +%Y%m%d-%H-%M)"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Generated tag: $TAG_NAME"
      
      - name: Create GitHub Release
        if: steps.check_regen.outputs.regen_requested == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.generate_tag.outputs.tag_name }}
        run: |
          gh release create "$TAG_NAME" \
            --repo="${GITHUB_REPOSITORY}" \
            --title="Documentation Release $TAG_NAME" \
            --notes="## Documentation Release

          This release was automatically generated after merging PR #${{ github.event.pull_request.number }}.

          **PR Title:** ${{ github.event.pull_request.title }}
          **PR Author:** @${{ github.event.pull_request.user.login }}
          **Merged by:** @${{ github.event.pull_request.merged_by.login }}
          **Merge Commit:** ${{ github.sha }}

          ### Changes
          ${{ github.event.pull_request.body }}

          ### Next Steps
          Documentation should be regenerated and published using the existing deployment workflow."
      
      - name: Summary
        if: steps.check_regen.outputs.regen_requested == 'true'
        run: |
          TAG_NAME="${{ steps.generate_tag.outputs.tag_name }}"
          echo "✅ Documentation release created successfully!"
          echo "📦 Tag: $TAG_NAME"
          echo "🔀 PR: #${{ github.event.pull_request.number }}"
          echo ""
          echo "A new release has been created with tag ${TAG_NAME}."
          echo "The existing deployment workflow will handle documentation generation and publishing."
      
      - name: Skip message
        if: steps.check_regen.outputs.regen_requested == 'false'
        run: |
          echo "ℹ️ Skipping release creation"
          echo "The PR did not request documentation regeneration."

