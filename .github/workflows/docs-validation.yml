# GitHub Actions Workflow for Documentation Validation and Deployment

name: Documentation Validation and Deployment

on:
  pull_request:
    branches:
      - main
      - master
  push:
    tags:
      - '*'

jobs:
  validate-docs:
    name: Validate Documentation Generation
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
      
      - name: Run documentation regeneration
        run: |
          echo "Running regenerate_docs.py..."
          python regenerate_docs.py
          EXIT_CODE=$?
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ Error: regenerate_docs.py failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi
          
          echo "✅ regenerate_docs.py completed successfully"
      
      - name: Check for generated files
        run: |
          if [ ! -d "pages" ]; then
            echo "❌ Error: pages directory was not created"
            exit 1
          fi
          
          if [ ! -f "pages/index.html" ]; then
            echo "❌ Error: index.html was not generated"
            exit 1
          fi
          
          echo "✅ Documentation validation successful!"
          echo "Generated files:"
          ls -la pages/

  deploy-docs:
    name: Deploy Documentation to Pages Branch
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
      
      - name: Run documentation regeneration
        run: |
          echo "Running regenerate_docs.py..."
          python regenerate_docs.py
          EXIT_CODE=$?
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ Error: regenerate_docs.py failed with exit code $EXIT_CODE"
            echo "Documentation generation failed. Aborting deployment."
            exit $EXIT_CODE
          fi
          
          echo "✅ regenerate_docs.py completed successfully"
      
      - name: Verify generated files
        run: |
          if [ ! -d "pages" ]; then
            echo "❌ Error: pages directory was not created"
            exit 1
          fi
          
          if [ ! -f "pages/index.html" ]; then
            echo "❌ Error: index.html was not generated"
            exit 1
          fi
          
          echo "✅ Documentation generated successfully!"
          echo "Generated files:"
          ls -la pages/
      
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Deploy to pages branch
        run: |
          # Get the tag name
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "Deploying documentation for tag: $TAG_NAME"
          
          # Save the generated pages directory
          cp -r pages /tmp/generated-pages
          
          # Check if pages branch exists
          if git ls-remote --heads origin pages | grep -q pages; then
            echo "Pages branch exists, checking it out..."
            git fetch origin pages
            git checkout pages
            # Remove all existing files except .git
            git rm -rf .
          else
            echo "Pages branch does not exist, creating it..."
            git checkout --orphan pages
            # Remove all files from the orphan branch
            git rm -rf . 2>/dev/null || true
          fi
          
          # Copy generated files to the pages branch root
          cp -r /tmp/generated-pages/* .
          
          # Add all files to git
          git add -A
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            # Commit with tag information
            git commit -m "Deploy documentation for tag ${TAG_NAME}" \
                       -m "Generated from commit ${GITHUB_SHA}" \
                       -m "Tag: ${TAG_NAME}"
            
            # Push to pages branch
            git push origin pages
            echo "✅ Successfully pushed to pages branch"
          fi
      
      - name: Summary
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "✅ Documentation deployed successfully!"
          echo "📦 Tag: $TAG_NAME"
          echo "🌐 Pages branch updated"
          echo ""
          echo "The generated documentation has been committed to the 'pages' branch."

