# GitHub Actions Workflow for Documentation Validation

name: Documentation Validation

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  validate-docs:
    name: Validate Documentation Generation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
      
      - name: Run documentation regeneration
        run: |
          echo "Running regenerate_docs.py..."
          python3 regenerate_docs.py -p docs
          EXIT_CODE=$?
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ Error: regenerate_docs.py failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi
          
          echo "✅ regenerate_docs.py completed successfully"
      
      - name: Check for generated files
        run: |
          if [ ! -d "docs" ]; then
            echo "❌ Error: docs directory was not created"
            exit 1
          fi
          
          if [ ! -f "docs/index.html" ]; then
            echo "❌ Error: index.html was not generated"
            exit 1
          fi
          
          echo "✅ Documentation validation successful!"
          echo "Generated files:"
          ls -la docs/

