# GitHub Actions Workflow for Documentation Deployment

name: Documentation Deployment

on:
  push:
    tags:
      - '*'
  release:
    types: [published, created]
  workflow_run:
    workflows: ["PR Merge Documentation Release"]
    types:
      - completed

jobs:
  deploy-docs:
    name: Deploy Documentation to Pages Branch
    runs-on: ubuntu-latest
    # Only run if triggered by push/release, or if workflow_run completed successfully
    if: |
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    
    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source
    
    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
      
      - name: Run documentation regeneration
        run: |
          echo "Running regenerate_docs.py..."
          python3 regenerate_docs.py -p docs
          EXIT_CODE=$?
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ Error: regenerate_docs.py failed with exit code $EXIT_CODE"
            echo "Documentation generation failed. Aborting deployment."
            exit $EXIT_CODE
          fi
          
          echo "✅ regenerate_docs.py completed successfully"
      
      - name: Verify generated files
        run: |
          if [ ! -d "docs" ]; then
            echo "❌ Error: docs directory was not created"
            exit 1
          fi
          
          if [ ! -f "docs/index.html" ]; then
            echo "❌ Error: index.html was not generated"
            exit 1
          fi
          
          echo "✅ Documentation generated successfully!"
          echo "Generated files:"
          ls -la docs/
      
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Determine version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            # For release events, use the release tag
            TAG_NAME="${{ github.event.release.tag_name }}"
          elif [ "${{ github.event_name }}" == "workflow_run" ]; then
            # For workflow_run events, get the most recent tag
            TAG_NAME=$(git describe --tags --abbrev=0)
          else
            # For push events, extract from ref
            TAG_NAME=${GITHUB_REF#refs/tags/}
          fi
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Deploying documentation for tag: $TAG_NAME"
      
      - name: Add .nojekyll file
        run: |
          # Create .nojekyll file to disable Jekyll processing
          touch docs/.nojekyll
          echo "✅ Added .nojekyll file to disable Jekyll"
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: Summary
        run: |
          TAG_NAME="${{ steps.version.outputs.tag }}"
          echo "✅ Documentation deployed successfully!"
          echo "📦 Tag: $TAG_NAME"
          echo "🌐 Deployed to GitHub Pages"
          echo "🎯 Triggered by: ${{ github.event_name }}"
          echo "🔗 URL: ${{ steps.deployment.outputs.page_url }}"

