---
"$schema": http://json-schema.org/draft-07/schema#
"$ref": "#/definitions/Welcome10"
title: "IBM Verify Directory: Virtual Directory"
description: >
  This page documents the YAML schema which can be used to configure
  a Verify Directory Virtual Directory container. <br><br>
  The value of each YAML key entry can be provided in the YAML file as either
  plain text, base-64 encoded text (prefix: 'B64:'), retrieved from an 
  environment variable (prefix: '$'), loaded from a local file (prefix: '@'),
  retrieved from a Kubernetes secret (format: secret:{name}/{field}), or 
  retrieved from a Kubernetes ConfigMap (format: configmap:{name}/{field}). 
  <br><br>
  In addition to this, each of the YAML keys can also be provided as an
  environment variable, using a normalized value of the key name as the
  environment variable name.  For example, to set the server port the following
  environment variable can be set: 'server.port'.

examples:
  - { "general": { "license": { "key": "VGVzdDotMTowOjCCAaQG...", "accept": "standard" }, "id": "test.ibm.com", "admin": { "pwd": "passw0rd1", "users": [ { "dn": "cn=admin", "pwd": "passw0rd1" } ] }, "ports": { "ldap": 0, "ldaps": 9636 } }, "virtual-dir": { "clusters": [ { "suffix": "o=sample", "endpoint-suffix": "o=backend", "servers": [ { "target": "ldap://server_a.ibm.com:389", "user": { "dn": "uid=Manager,cn=ibmpolicies", "password": "passw0rd" } }, { "target": "ldap://server_b.ibm.com:389", "user": { "dn": "uid=Manager,cn=ibmpolicies", "password": "passw0rd" } } ], "attr-mapping": [ { "attr": "cn", "endpoint-attr": "cn", "class": "Normal" } ] } ] } }

definitions:
  Welcome10:
    type: object
    properties:
      advanced:
        "$ref": "advanced.yaml#/definitions/advanced"
      debug:
        "$ref": "debug.yaml#/definitions/debug"
      general:
        "$ref": "general-virtualdir.yaml#/definitions/general"
      keyfile:
        "$ref": "keyfile.yaml#/definitions/keyfile"
      virtual-dir:
        "$ref": "virtualdir.yaml#/definitions/virtual-dir"
    required:
    - general
    - virtual-dir
    title: Welcome10
