"$schema": http://json-schema.org/draft-07/schema#
type: object

definitions:
  general:
    description: >
      The general configuration elements of the container.
    type: object
    properties:
      admin:
        type: object
        description: >
          The credential information of the server.
        properties:
          dn:
            type: string
            description: >
              The distinguished name of the user which can be used to authenticate to the server.
            default: "cn=root"
          pwd:
            type: string
            description: >
              The password of the user which can be used to authenticate to the server.
          users:
            type: array
            description: >
              Additional administrative users for this server.
            items:
              type: object
              properties:
                cn:
                  description: >
                    The common name of the user.
                  type: string
                pwd:
                  description: >
                    The password of the user.  This password must conform
                    to the configured password policy.
                  type: string
                role:
                  description: >
                    The role assigned to the user.  Refer to the official
                    documentation for the permissions assigned to each role.
                    Please note that the value is case sensitive.
                  enum:
                  - AuditAdmin
                  - DirDataAdmin
                  - NoAdmin
                  - PasswordAdmin
                  - ReplicationAdmin
                  - SchemaAdmin
                  - ServerConfigGroupMember
              required:
              - cn
              - pwd
              - role
        required:
        - pwd
      audit:
        "$ref": "general-audit.yaml#/definitions/audit"
      id:
        type: string
        description: >
          The identifier of the server.  If no identifier is specified the
          hostname of the container will be used as the identifier.
      json-logging:
        type: boolean
        description: >
          Whether the logging and auditing messages should be formatted in 
          JSON or not.
        default: true
      key-stash:
        type: string
        description: >
          The contents of the key stash file (.ksf) which is used to protect
          data.  This file should be provided if cryptographic synchronisation
          is required between different servers.  The key stash can either be 
          obtained from a software based directory server installation, or a 
          new one can be generated by starting this image with the 'keystash' 
          argument.  For example:
          'docker run --rm icr.io/isvd/verify-directory-seed:latest keystash'.
          Please note that this will send a base-64 encoded version of the
          key stash to the console of the container.
      license:
        type: object
        properties:
          key:
            type: string
            description: >
              The license key, required to run the container.
          accept:
            type: string
            description: >
              Which license agreement has been accepted, either 'limited' or
              'standard' or 'enterprise'.  To display a license agreement start the
              container with the 'license' command, for example: 
              'docker run --rm icr.io/isvd/verify-directory-server:latest license standard'
            enum:
            - limited
            - standard
            - enterprise
        required:
        - key
        - accept
      ports:
        type: object
        description: >
          The ports on which the server will listen for requests.
        properties:
          ldap:
            type: integer
            description: >
              The port on which the server will listen for LDAP requests.  A
              value of '0' is used to indicate that the server should not
              listen for LDAP requests.  Please note that the server can
              listen on ports lower than 1024, but in order to do so the
              container infrastructure must grant the container the necessary
              permissions.
            default: 0
          ldaps:
            type: integer
            description: >
              The port on which the server will listen for LDAPS requests.  A
              value of '0' is used to indicate that the server should not
              listen for LDAPS requests.  Please note that the server can
              listen on ports lower than 1024, but in order to do so the
              container infrastructure must grant the container the necessary
              permissions.
            default: 9636
      pwd-encryption:
        type: string
        description: >
           The encoding mechanism for the user passwords before they are 
           stored in the directory.  Please note that the value is case 
           sensitive.
        enum:
        - none
        - aes128
        - aes192
        - aes256
        - crypt
        - sha
        - ssha
        - md5
        - sha224
        - sha256
        - sha384
        - sha512
        - ssha224
        - ssha256
        - ssha384
        - ssha512
        - pbkdf2-sha1
        - pbkdf2-sha224
        - pbkdf2-sha256
        - pbkdf2-sha384
        - pbkdf2-sha512
        - scrypt
        - argon2
        default: ssha512
      pwd-policy:
        "$ref": "general-pwd-policy.yaml#/definitions/pwd-policy"
      schemas:
        "$ref": "general-schemas.yaml#/definitions/schemas"
      ssl:
        type: object
        description: >
          SSL configuration details for the server.
        properties:
          auth:
            type: string
            description: >
              The authentication type for the ssl connection.  The options
              include:

              - ServerAuth: Supports server authentication at the client.

              - ServerClientAuth: Supports both server and client authentication.

              Please note that the value is case sensitive.
            enum:
            - ServerAuth
            - ServerClientAuth
            default: ServerAuth
          cert-label:
            type: string
            description: >
              The label that identifies the servers Personal Certificate in 
              the key database file.  If the field is not specified the default
              certificate from the key file will be used by the LDAP server 
              for SSL connections.
          ciphers:
            type: array
            description: >
              The allowable encryption/decryption methods for establishing a 
              SSL connection between LDAP client(s) and server.  Please note
              that the value is case sensitive.
            items:
              type: string
              enum:
              - AES
              - AES-128
              - AES-256
              - RC4-128-MD5
              - RC4-128-SHA
              - TripleDES-168
              - DES-56
              - RC4-40-MD5
              - RC2-40-MD5
              - TLS_RSA_WITH_RC4_128_SHA
              - TLS_RSA_WITH_3DES_EDE_CBC_SHA
              - TLS_RSA_WITH_AES_128_CBC_SHA
              - TLS_RSA_WITH_AES_128_GCM_SHA256
              - TLS_RSA_WITH_AES_256_CBC_SHA
              - TLS_RSA_WITH_AES_256_GCM_SHA384
              - TLS_RSA_WITH_AES_128_CBC_SHA256
              - TLS_RSA_WITH_AES_256_CBC_SHA256
              - TLS_ECDHE_ECDSA_WITH_RC4_128_SHA
              - TLS_ECDHE_ECDSA_WITH_3DES_EDE_CBC_SHA
              - TLS_ECDHE_ECDSA_WITH_AES_128_CBC_SHA
              - TLS_ECDHE_ECDSA_WITH_AES_256_CBC_SHA
              - TLS_ECDHE_RSA_WITH_3DES_EDE_CBC_SHA
              - TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA
              - TLS_ECDHE_RSA_WITH_AES_256_CBC_SHA
              - TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA256
              - TLS_ECDHE_RSA_WITH_AES_256_CBC_SHA384
              - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
              - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
              - TLS_ECDHE_RSA_WITH_RC4_128_SHA
              - TLS_ECDHE_ECDSA_WITH_AES_128_CBC_SHA256
              - TLS_ECDHE_ECDSA_WITH_AES_256_CBC_SHA384
              - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA1
              - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA1
              - TLS_AES_128_GCM_SHA256
              - TLS_AES_256_GCM_SHA384
              - TLS_CHACHA20_POLY1305_SHA256
              - TLS_AES_128_CCM_SHA256
              - TLS_AES_128_CCM_8_SHA256
          protocols:
            type: array
            description: >
              The SSL or TLS protocol versions to enable for the connection.  The options
              include:
              - SSLV3: Secure Sockets Layer version 3.0.
              - TLS10: Transport Layer Security version 1.0.
              - TLS11: Transport Layer Security version 1.1.
              - TLS12: Transport Layer Security version 1.2.
              - TLS13: Transport Layer Security version 1.3.
              Please note that the value is case sensitive.
            items:
              type: string
              enum:
              - SSLV3
              - TLS10
              - TLS11
              - TLS12
              - TLS13
          fips:
            type: boolean
            description: >
              Should the server operate in FIPS process mode?
            default: false
          fips-fallback:
            type: boolean
            description: >
              The non-FIPS certified crypographic library is loaded as a secondary backup and is used if a requested algorithm is not contained in the certified library.  This configuration option is ignored if the 'general.ssl.fips' configuration entry has not been set to 'true'.
            default: false
    title: General
    examples:
    - { "general": { "license": { "key": "VGVzdDotMTowOjCCAaQG...", "accept": "standard" }, "id": "test.ibm.com", "admin": { "pwd": "passw0rd1" }, "ports": { "ldap": 0, "ldaps": 9636 } } }
    required:
    - license
    - admin


