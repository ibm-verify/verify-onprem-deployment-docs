"$schema": http://json-schema.org/draft-07/schema#
type: object
definitions:
  debug:
    type: object
    description: >
      The configuration entries which can be used to enable debugging within
      the container.
    properties:
      startup:
        type: boolean
        description: >
          A boolean which is used to indicate whether debugging should be 
            enabled while bootstrapping the container.
        default: false
      runtime:
        type: number
        description: >
          Specifies the debug level to assign to the runtime. The value is a 
          bit mask that controls which output is generated, with values from 1 
          to 65535.
        default: 0
        minimum: 0
        maximum: 65535
    title: Debug
